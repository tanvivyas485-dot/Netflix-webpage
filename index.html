<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 1rem 2rem;
            z-index: 100;
            display: flex;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .logo {
            width: 100px;
            cursor: pointer;
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #e50914;
        }
        .featured {
            height: 80vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/9d3533b2-0c24-47a3-9468-1ca1d8f7bdc6/52b76e90-7f22-446e-8d8a-80d6f6d9f9f1/IN-en-20240527-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            margin-top: 70px;
        }
        .featured-content {
            max-width: 500px;
        }
        .featured h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .featured p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .play-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .play-btn:hover {
            background-color: #b2070f;
        }
        .movie-row {
            margin: 2rem 0;
            padding: 0 2rem;
        }
        .movie-row h2 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        .movies {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 1rem;
        }
        .movie-card {
            min-width: 120px;
            height: 180px;
            background-color: #333;
            border-radius: 4px;
            transition: transform 0.3s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .movies::-webkit-scrollbar {
            height: 8px;
        }
        .movies::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 4px;
        }
        .movies::-webkit-scrollbar-track {
            background-color: #333;
        }
        @media (max-width: 768px) {
            .featured h1 {
                font-size: 2rem;
            }
            .featured p {
                font-size: 1rem;
            }
            .movies {
                gap: 0.5rem;
            }
            .movie-card {
                min-width: 100px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="nav-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Netflix_2015_logo.svg/250px-Netflix_2015_logo.svg.png" alt="Netflix Logo" class="logo">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">My List</a></li>
            </ul>
        </div>
    </nav>

    <!-- Featured Banner -->
    <div class="featured">
        <div class="featured-content">
            <h1>Stranger Things</h1>
            <p>When a young boy disappears, his mother, a police chief, and his friends must confront terrifying forces in order to get him back.</p>
            <button class="play-btn">▶ Play</button>
        </div>
    </div>

    <!-- Movie Rows -->
    <div class="movie-row">
        <h2>Trending Now</h2>
        <div class="movies">
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="Stranger Things">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="Inception">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="The Shawshank Redemption">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="Pulp Fiction">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="The Godfather">
            </div>
        </div>
    </div>

    <div class="movie-row">
        <h2>Popular on Netflix</h2>
        <div class="movies">
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="Fight Club">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="The Matrix">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="Forrest Gump">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="The Silence of the Lambs">
            </div>
            <div class="movie-card">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiLz48L3N2Zz4=" alt="The Departed">
            </div>
        </div>
    </div>

    <script>
        // Simple scroll effect for movie rows
        document.querySelectorAll('.movies').forEach(movieRow => {
            let isDown = false;
            let startX;
            let scrollLeft;

            movieRow.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - movieRow.offsetLeft;
                scrollLeft = movieRow.scrollLeft;
            });

            movieRow.addEventListener('mouseleave', () => {
                isDown = false;
            });

            movieRow.addEventListener('mouseup', () => {
                isDown = false;
            });

            movieRow.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - movieRow.offsetLeft;
                const walk = (x - startX) * 2;
                movieRow.scrollLeft = scrollLeft - walk;
            });
        });
    </script>
</body>
</html>
